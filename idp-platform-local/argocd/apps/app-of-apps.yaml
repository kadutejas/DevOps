# App-of-Apps bootstrap manifest
#
# WHY App-of-Apps: Apply this ONCE manually after ArgoCD is installed.
# From that point ArgoCD watches argocd/apps/ in your Git repo and
# self-manages every Application file it finds there — pure GitOps.
#
# HOW it works:
#   1. bootstrap.sh applies this file with kubectl apply -f
#   2. ArgoCD syncs argocd/apps/ from Git
#   3. Each *.yaml in apps/ becomes a managed Application (e.g. monitoring)
#   4. Any new app you commit to apps/ is auto-deployed — no kubectl needed
#
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps
  namespace: argocd
  annotations:
    # sync-wave -1 ensures this app is reconciled before child apps
    argocd.argoproj.io/sync-wave: "-1"

spec:
  project: default

  source:
    repoURL: https://github.com/kadutejas/DevOps
    targetRevision: HEAD
    # Path is relative to the repo root — IDP files live inside idp-platform-local/
    path: idp-platform-local/argocd/apps

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true      # Remove ArgoCD apps when their manifests are deleted from Git
      selfHeal: true   # Re-apply if someone manually changes something in the cluster
    syncOptions:
      - CreateNamespace=true
