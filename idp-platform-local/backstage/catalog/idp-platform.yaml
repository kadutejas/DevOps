apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: devops-team
  description: Platform & DevOps engineering team
spec:
  type: team
  profile:
    displayName: DevOps Team
  children: []

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: idp-platform
  description: Internal Developer Platform — local kind cluster
  tags:
    - platform
    - devops
    - kubernetes
  links:
    - url: https://github.com/kadutejas/DevOps
      title: GitHub Repo
      icon: github
spec:
  owner: devops-team

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: argocd
  description: GitOps continuous delivery engine. Watches the kadutejas/DevOps repo and applies changes to the kind cluster automatically.
  tags:
    - gitops
    - kubernetes
    - cd
  links:
    - url: http://localhost:30000
      title: ArgoCD UI
      icon: dashboard
  annotations:
    github.com/project-slug: kadutejas/DevOps
spec:
  type: service
  lifecycle: production
  owner: devops-team
  system: idp-platform

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: prometheus
  description: Metrics collection, storage, and alerting. Scrapes all Kubernetes workloads every 30s.
  tags:
    - monitoring
    - metrics
    - observability
  annotations:
    github.com/project-slug: kadutejas/DevOps
spec:
  type: service
  lifecycle: production
  owner: devops-team
  system: idp-platform
  dependsOn:
    - component:grafana

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: grafana
  description: Observability dashboards. Pre-loaded with Kubernetes node, pod, and namespace views via ConfigMap sidecar.
  tags:
    - monitoring
    - dashboards
    - observability
  links:
    - url: http://localhost:30001
      title: Grafana UI
      icon: dashboard
  annotations:
    github.com/project-slug: kadutejas/DevOps
spec:
  type: service
  lifecycle: production
  owner: devops-team
  system: idp-platform

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: backstage
  description: Developer portal. Service catalog, documentation hub, and scaffolder for the IDP Platform.
  tags:
    - platform
    - developer-portal
    - idp
  links:
    - url: http://localhost:30002
      title: Backstage UI
      icon: dashboard
  annotations:
    github.com/project-slug: kadutejas/DevOps
spec:
  type: website
  lifecycle: production
  owner: devops-team
  system: idp-platform
